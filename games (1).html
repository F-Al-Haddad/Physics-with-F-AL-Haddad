<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edu Games | Physics with F AL-Haddad</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0B1A2A;--bg2:#0f2236;--bg3:#132840;
    --text:#E8F1F8;--text-dim:#8faec7;
    --primary:#4FC3F7;--accent:#81C784;
    --glow:rgba(79,195,247,0.3);--gold:#FFD54F;
    --danger:#EF5350;--success:#66BB6A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,0.7) 0%,transparent 100%),
      radial-gradient(1px 1px at 30% 60%,rgba(255,255,255,0.5) 0%,transparent 100%),
      radial-gradient(1px 1px at 50% 30%,rgba(255,255,255,0.8) 0%,transparent 100%),
      radial-gradient(1px 1px at 75% 80%,rgba(255,255,255,0.4) 0%,transparent 100%),
      radial-gradient(2px 2px at 20% 85%,rgba(79,195,247,0.5) 0%,transparent 100%),
      radial-gradient(2px 2px at 80% 20%,rgba(129,199,132,0.4) 0%,transparent 100%),
      radial-gradient(1px 1px at 90% 50%,rgba(255,255,255,0.6) 0%,transparent 100%);
    pointer-events:none;z-index:0;
  }
  nav{position:sticky;top:0;z-index:100;background:rgba(11,26,42,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(79,195,247,0.2);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;}
  .nav-logo{font-family:'Orbitron',monospace;font-size:1rem;color:var(--primary);text-decoration:none;letter-spacing:1px;}
  .nav-links{display:flex;gap:1.5rem;list-style:none;}
  .nav-links a{color:var(--text-dim);text-decoration:none;font-size:0.95rem;font-weight:500;transition:color 0.3s;}
  .nav-links a:hover,.nav-links a.active{color:var(--primary);}
  .hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer;}
  @media(max-width:768px){
    .hamburger{display:block;}
    .nav-links{display:none;flex-direction:column;position:absolute;top:64px;left:0;right:0;background:rgba(11,26,42,0.98);padding:1rem 2rem;gap:1rem;border-bottom:1px solid rgba(79,195,247,0.2);}
    .nav-links.open{display:flex;}
  }
  .page-hero{position:relative;z-index:1;padding:4rem 2rem 2rem;text-align:center;background:linear-gradient(180deg,rgba(79,195,247,0.05) 0%,transparent 100%);}
  .page-hero h1{font-family:'Orbitron',monospace;font-size:clamp(1.8rem,5vw,3rem);color:var(--primary);margin-bottom:0.5rem;}
  .page-hero p{color:var(--text-dim);}

  /* GAMES GRID */
  .games-container{max-width:1100px;margin:0 auto;padding:2rem;position:relative;z-index:1;}
  .games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;margin-bottom:3rem;}

  .game-card{
    background:var(--bg2);border:1px solid rgba(79,195,247,0.15);border-radius:20px;
    padding:0;overflow:hidden;transition:all 0.4s;cursor:pointer;
  }
  .game-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,0.5),0 0 30px var(--card-glow,rgba(79,195,247,0.15));}
  .game-card-header{
    padding:2rem 1.5rem 1.5rem;
    background:linear-gradient(135deg,var(--card-from,rgba(79,195,247,0.1)),var(--card-to,rgba(129,199,132,0.05)));
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .game-icon{font-size:3rem;margin-bottom:0.75rem;display:block;}
  .game-card h3{font-size:1.1rem;font-weight:800;margin-bottom:0.5rem;color:var(--text);}
  .game-card p{font-size:0.85rem;color:var(--text-dim);line-height:1.6;}
  .game-card-footer{padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
  .game-meta{display:flex;gap:0.75rem;}
  .meta-tag{
    display:inline-flex;align-items:center;gap:0.25rem;
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
    border-radius:100px;padding:0.25rem 0.75rem;font-size:0.75rem;color:var(--text-dim);
  }
  /* Progress bar */
  .progress-wrap{padding:0 1.5rem 1.25rem;}
  .progress-label{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-dim);margin-bottom:0.4rem;}
  .progress-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width 1s ease;}
  /* Badge */
  .badge{
    display:inline-flex;align-items:center;gap:0.35rem;
    padding:0.3rem 0.75rem;border-radius:100px;font-size:0.8rem;font-weight:700;
    background:rgba(255,213,79,0.15);border:1px solid rgba(255,213,79,0.3);color:var(--gold);
  }
  .badge-locked{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:var(--text-dim);}

  .play-btn{
    display:inline-flex;align-items:center;gap:0.5rem;
    padding:0.6rem 1.5rem;border-radius:8px;font-family:'Tajawal',sans-serif;
    font-size:0.95rem;font-weight:700;cursor:pointer;border:none;
    background:linear-gradient(135deg,var(--primary),#29b6f6);color:#0B1A2A;
    transition:all 0.3s;
  }
  .play-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(79,195,247,0.4);}

  /* GAME MODAL */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
    z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;
    opacity:0;pointer-events:none;transition:opacity 0.3s;
  }
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{
    background:var(--bg2);border:1px solid rgba(79,195,247,0.25);border-radius:24px;
    width:100%;max-width:680px;max-height:90vh;overflow-y:auto;
    transform:scale(0.9);transition:transform 0.3s;
  }
  .modal-overlay.open .modal{transform:scale(1);}
  .modal-header{
    padding:1.75rem 2rem;border-bottom:1px solid rgba(79,195,247,0.1);
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;
    background:var(--bg2);z-index:10;
  }
  .modal-title{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--primary);}
  .modal-close{background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer;transition:color 0.3s;line-height:1;}
  .modal-close:hover{color:var(--danger);}
  .modal-body{padding:2rem;}

  /* Question */
  .q-counter{font-size:0.85rem;color:var(--text-dim);margin-bottom:0.5rem;}
  .q-progress{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:1.5rem;overflow:hidden;}
  .q-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;transition:width 0.4s;}
  .q-text{font-size:1.15rem;font-weight:700;margin-bottom:1.5rem;line-height:1.6;}
  .options{display:flex;flex-direction:column;gap:0.75rem;}
  .option-btn{
    width:100%;text-align:right;padding:1rem 1.25rem;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;
    font-size:1rem;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:0.75rem;
  }
  .option-btn:hover:not(:disabled){background:rgba(79,195,247,0.1);border-color:rgba(79,195,247,0.4);}
  .option-btn.correct{background:rgba(102,187,106,0.2)!important;border-color:var(--success)!important;color:var(--success)!important;}
  .option-btn.wrong{background:rgba(239,83,80,0.15)!important;border-color:var(--danger)!important;color:var(--danger)!important;}
  .option-btn:disabled{cursor:default;}
  .feedback{
    margin-top:1rem;padding:1rem;border-radius:10px;font-size:0.95rem;line-height:1.6;
    display:none;
  }
  .feedback.show{display:block;}
  .feedback.correct-fb{background:rgba(102,187,106,0.15);border:1px solid rgba(102,187,106,0.3);color:var(--success);}
  .feedback.wrong-fb{background:rgba(239,83,80,0.12);border:1px solid rgba(239,83,80,0.3);color:var(--danger);}
  .next-btn{
    margin-top:1.5rem;width:100%;padding:0.9rem;border-radius:10px;
    font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;
    background:linear-gradient(135deg,var(--primary),#29b6f6);color:#0B1A2A;
    border:none;cursor:pointer;transition:all 0.3s;display:none;
  }
  .next-btn.show{display:block;}
  .next-btn:hover{transform:translateY(-2px);}

  /* Results */
  .results{text-align:center;padding:1rem 0;}
  .score-circle{
    width:140px;height:140px;border-radius:50%;margin:0 auto 1.5rem;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:conic-gradient(var(--primary) calc(var(--pct)*3.6deg),rgba(255,255,255,0.08) 0deg);
    box-shadow:0 0 40px rgba(79,195,247,0.3);
    position:relative;
  }
  .score-inner{
    position:absolute;inset:10px;border-radius:50%;background:var(--bg2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .score-number{font-family:'Orbitron',monospace;font-size:2rem;color:var(--primary);font-weight:700;}
  .score-total{font-size:0.8rem;color:var(--text-dim);}
  .results h3{font-size:1.4rem;font-weight:800;margin-bottom:0.5rem;}
  .results-msg{color:var(--text-dim);margin-bottom:1.5rem;}
  .earned-badge{
    display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.5rem;
    border-radius:100px;font-size:1rem;font-weight:700;
    background:rgba(255,213,79,0.15);border:2px solid var(--gold);color:var(--gold);
    margin-bottom:1.5rem;
  }
  .results-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
  .btn-retry{
    padding:0.8rem 1.5rem;border-radius:10px;background:transparent;
    border:2px solid var(--primary);color:var(--primary);
    font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;
  }
  .btn-retry:hover{background:rgba(79,195,247,0.1);}
  .btn-done{
    padding:0.8rem 1.5rem;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),#4caf50);color:#0B1A2A;
    border:none;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;
  }
  .btn-done:hover{transform:translateY(-2px);}

  /* Chart section */
  .chart-section{
    background:var(--bg2);border:1px solid rgba(79,195,247,0.15);border-radius:20px;
    padding:2rem;margin-top:2rem;
  }
  .chart-section h3{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--primary);margin-bottom:1.5rem;text-align:center;}
  .chart-wrap{position:relative;height:300px;}

  /* Sound indicator */
  .sound-toggle{
    position:fixed;bottom:2rem;left:2rem;z-index:50;
    background:var(--bg2);border:1px solid rgba(79,195,247,0.3);border-radius:50%;
    width:48px;height:48px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:1.3rem;transition:all 0.3s;box-shadow:0 4px 15px rgba(0,0,0,0.3);
  }
  .sound-toggle:hover{background:rgba(79,195,247,0.1);}

  footer{background:rgba(7,18,30,0.9);border-top:1px solid rgba(79,195,247,0.15);padding:2rem;text-align:center;color:var(--text-dim);font-size:0.9rem;position:relative;z-index:1;}
  footer span{color:var(--primary);}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">⚛ Physics F AL-Haddad</a>
  <button class="hamburger" onclick="toggleNav()">☰</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">الرئيسية</a></li>
    <li><a href="games.html" class="active">🎮 Edu Games</a></li>
    <li><a href="hub.html">📚 Learning Hub</a></li>
    <li><a href="about.html">👩‍🔬 About Me</a></li>
  </ul>
</nav>

<div class="page-hero">
  <h1>🎮 Edu Games</h1>
  <p>العب واختبر معلوماتك في الفيزياء الحديثة — 6 أسئلة لكل لعبة</p>
</div>

<div class="games-container">
  <div class="games-grid" id="gamesGrid"></div>

  <div class="chart-section">
    <h3>📊 نتائجك في جميع الألعاب</h3>
    <div class="chart-wrap"><canvas id="resultsChart"></canvas></div>
  </div>
</div>

<!-- GAME MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Sound toggle -->
<div class="sound-toggle" id="soundToggle" onclick="toggleSound()" title="تشغيل/إيقاف الصوت">🔊</div>

<footer>
  <p>صُنع بـ ❤️ بواسطة <span>فاطمة عبدالله حمد الحداد</span> | مدرسة جدحفص الثانوية للبنات</p>
</footer>

<script>
// ===================== DATA =====================
const GAMES = [
  {
    id:'dark_matter',
    icon:'🌌',
    title:'المادة المعتمة في الكون',
    desc:'اختبر معلوماتك حول طبيعة المادة المعتمة وتأثيرها على الكون',
    cardFrom:'rgba(100,80,200,0.12)',cardTo:'rgba(79,195,247,0.05)',
    glow:'rgba(100,80,200,0.2)',
    questions:[
      {q:'ما نسبة المادة المعتمة من إجمالي مادة الكون؟',opts:['5%','27%','68%','15%'],ans:1,exp:'تشكّل المادة المعتمة حوالي 27% من الكون، بينما تشكّل الطاقة المعتمة 68% والمادة العادية 5% فقط.'},
      {q:'لماذا تسمى المادة "المعتمة"؟',opts:['لأنها سوداء اللون','لأنها لا تُصدر ولا تعكس الضوء','لأنها موجودة في المناطق المظلمة','لأنها خطرة'],ans:1,exp:'سميت معتمة لأنها لا تتفاعل مع الضوء أو الإشعاع الكهرومغناطيسي، لذلك لا يمكن رؤيتها مباشرة.'},
      {q:'كيف يُكشف عن وجود المادة المعتمة؟',opts:['بالرؤية المباشرة','بقياس تأثيرها الجاذبي','بالتحليل الطيفي','برادارات خاصة'],ans:1,exp:'يُستدل على وجودها من خلال تأثيرها الجاذبي على المجرات والعدسات الجاذبية.'},
      {q:'ما أهمية المادة المعتمة في تشكّل المجرات؟',opts:['تُضيء المجرات','تُشكّل الهيكل العظمي الكوني الذي تتجمع حوله المجرات','تُسرّع تمدد الكون','لا دور لها'],ans:1,exp:'تعمل المادة المعتمة كهيكل عظمي جاذبي تتشكل حوله المجرات وعناقيد المجرات.'},
      {q:'أيّ من التالية جسيم مرشح لتكوين المادة المعتمة؟',opts:['البروتون','النيوترون','WIMPs (جسيمات ضخمة تتفاعل ضعيفاً)','الإلكترون'],ans:2,exp:'جسيمات WIMP هي من أبرز المرشحين النظريين لتشكيل المادة المعتمة وتخضع لأبحاث مكثفة.'},
      {q:'ما الفرق بين المادة المعتمة والطاقة المعتمة؟',opts:['لا فرق بينهما','المادة المعتمة تُسبب الجذب، الطاقة المعتمة تُسبب تسارع التمدد','الطاقة المعتمة أقل نسبة','المادة المعتمة موجودة في الشمس'],ans:1,exp:'المادة المعتمة تمارس جاذبية تُبطئ التمدد، بينما الطاقة المعتمة تُسرّع تمدد الكون.'},
    ]
  },
  {
    id:'carbon',
    icon:'🌿',
    title:'البصمة الكربونية والتفاعلات النووية',
    desc:'تعلّم العلاقة بين التفاعلات النووية وانبعاثات الكربون',
    cardFrom:'rgba(129,199,132,0.12)',cardTo:'rgba(79,195,247,0.03)',
    glow:'rgba(129,199,132,0.2)',
    questions:[
      {q:'ما البصمة الكربونية؟',opts:['آثار الأقدام الكربونية','كمية غاز CO₂ الصادر عن نشاط بشري معين','نوع من الوقود','صيغة كيميائية'],ans:1,exp:'هي مقياس لإجمالي انبعاثات غاز ثاني أكسيد الكربون الناتجة عن النشاط البشري.'},
      {q:'كيف تُسهم الطاقة النووية في تقليل البصمة الكربونية؟',opts:['تُنتج كميات ضخمة من CO₂','لا تُصدر انبعاثات CO₂ أثناء التشغيل','تستهلك الأكسجين','تُسبب ثاني أكسيد الكبريت'],ans:1,exp:'المفاعلات النووية لا تحرق وقوداً أحفورياً، لذا فهي لا تُنتج CO₂ أثناء توليد الكهرباء.'},
      {q:'ما التفاعل النووي الأساسي المستخدم في محطات الطاقة؟',opts:['الاندماج النووي','الانشطار النووي','التحلل البيتا','تحلل ألفا'],ans:1,exp:'يعتمد معظم المفاعلات النووية على الانشطار، إذ تنشطر نوى اليورانيوم-235 لإطلاق طاقة ضخمة.'},
      {q:'أيّ مصادر الطاقة الآتية الأقل انبعاثاً للكربون على مدار دورة حياتها؟',opts:['الفحم','النفط','الطاقة النووية','الغاز الطبيعي'],ans:2,exp:'تُصنّف الطاقة النووية ضمن أدنى مصادر الطاقة في انبعاثات الكربون على مدار دورة حياتها الكاملة.'},
      {q:'ما النفايات النووية وكيف تُعالَج؟',opts:['مواد آمنة تماماً','نفايات مشعة تُحفظ في طبقات جيولوجية عميقة','تُحرق في الغلاف الجوي','تُستخدم في الزراعة'],ans:1,exp:'النفايات النووية مشعة وتحتاج إلى عزل في مستودعات عميقة لآلاف السنين حتى تتحلل.'},
      {q:'ما علاقة الاندماج النووي بالبصمة الكربونية مستقبلاً؟',opts:['سيزيد الانبعاثات','قد يُزوّد البشرية بطاقة شبه لا محدودة دون انبعاثات تقريباً','لن يؤثر','مصدر كربوني'],ans:1,exp:'الاندماج النووي كالذي يحدث في الشمس واعدٌ بطاقة نظيفة وفيرة إذا تحقق تجارياً.'},
    ]
  },
  {
    id:'agri',
    icon:'🌾',
    title:'التقنيات النووية والزراعة المستدامة',
    desc:'اكتشف دور التقنيات النووية في تطوير الإنتاج الزراعي',
    cardFrom:'rgba(255,200,70,0.1)',cardTo:'rgba(129,199,132,0.05)',
    glow:'rgba(255,200,70,0.2)',
    questions:[
      {q:'كيف تُستخدم الإشعاعات في تحسين البذور الزراعية؟',opts:['لتجفيفها','لإحداث طفرات جينية تُنتج أصناف محسّنة','لتلوينها','لزيادة حجمها فحسب'],ans:1,exp:'تُستخدم الأشعة لإحداث طفرات جينية تُنتج أصناف ذات إنتاجية أعلى ومقاومة للجفاف والأمراض.'},

// ===================== STATE =====================
let soundEnabled = true;
let currentGameId = null;
let currentQ = 0;
let score = 0;
let answered = false;
let scores = JSON.parse(localStorage.getItem('physicsScores') || '{}');

// ===================== AUDIO =====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio(){ if(!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
function playTone(freq, type='sine', dur=0.3, vol=0.3){
  if(!soundEnabled) return;
  try{
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = type;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  }catch(e){}
}
function playCorrect(){ playTone(880,'sine',0.4,0.2); setTimeout(()=>playTone(1100,'sine',0.3,0.15),150); }
function playWrong(){ playTone(220,'sawtooth',0.4,0.25); }
function toggleSound(){
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
}

// ===================== RENDER CARDS =====================
function renderCards(){
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = GAMES.map(g=>{
    const s = scores[g.id];
    const pct = s ? Math.round((s.score/6)*100) : 0;
    const hasBadge = s && s.score >= 4;
    return `
    <div class="game-card" style="--card-from:${g.cardFrom};--card-to:${g.cardTo};--card-glow:${g.glow};">
      <div class="game-card-header">
        <span class="game-icon">${g.icon}</span>
        <h3>${g.title}</h3>
        <p>${g.desc}</p>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>التقدم</span>
          <span>${s ? `${s.score}/6` : 'لم تلعب بعد'}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="game-card-footer">
        <div class="game-meta">
          <span class="meta-tag">❓ 6 أسئلة</span>
          ${hasBadge ? `<span class="badge">🏆 ${getBadge(s.score)}</span>` : `<span class="badge badge-locked">🔒 شارة</span>`}
        </div>
        <button class="play-btn" onclick="openGame('${g.id}')">▶ العب</button>
      </div>
    </div>
    `;
  }).join('');
}

function getBadge(score){
  if(score===6) return 'خبير';
  if(score>=4) return 'متفوق';
  return '';
}

// ===================== GAME LOGIC =====================
function openGame(id){
  currentGameId = id;
  currentQ = 0;
  score = 0;
  answered = false;
  const g = GAMES.find(x=>x.id===id);
  document.getElementById('modalTitle').textContent = g.icon + ' ' + g.title;
  document.getElementById('modalOverlay').classList.add('open');
  renderQuestion(g);
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  renderCards();
  renderChart();
}
function renderQuestion(g){
  const q = g.questions[currentQ];
  const pct = Math.round((currentQ/6)*100);
  document.getElementById('modalBody').innerHTML = `
    <div class="q-counter">السؤال ${currentQ+1} من 6</div>
    <div class="q-progress"><div class="q-progress-fill" style="width:${pct}%"></div></div>
    <div class="q-text">${q.q}</div>
    <div class="options">
      ${q.opts.map((o,i)=>`<button class="option-btn" onclick="selectAnswer(${i})" id="opt${i}">
        <span style="background:rgba(79,195,247,0.1);border:1px solid rgba(79,195,247,0.2);border-radius:6px;padding:0.2rem 0.6rem;font-size:0.85rem;min-width:28px;text-align:center;">${['أ','ب','ج','د'][i]}</span>
        ${o}
      </button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">${currentQ===5 ? '🏆 عرض النتيجة' : '→ السؤال التالي'}</button>
  `;
  answered = false;
}
function selectAnswer(idx){
  if(answered) return;
  answered = true;
  const g = GAMES.find(x=>x.id===currentGameId);
  const q = g.questions[currentQ];
  const opts = document.querySelectorAll('.option-btn');
  opts.forEach(b=>b.disabled=true);
  const fb = document.getElementById('feedback');
  if(idx === q.ans){
    score++;
    opts[idx].classList.add('correct');
    fb.className='feedback correct-fb show';
    fb.innerHTML = '✅ إجابة صحيحة! ' + q.exp;
    playCorrect();
  } else {
    opts[idx].classList.add('wrong');
    opts[q.ans].classList.add('correct');
    fb.className='feedback wrong-fb show';
    fb.innerHTML = '❌ إجابة خاطئة. ' + q.exp;
    playWrong();
  }
  document.getElementById('nextBtn').classList.add('show');
}
function nextQuestion(){
  currentQ++;
  const g = GAMES.find(x=>x.id===currentGameId);
  if(currentQ >= 6){
    showResults(g);
  } else {
    renderQuestion(g);
  }
}
function showResults(g){
  const pct = Math.round((score/6)*100);
  const hasBadge = score >= 4;
  const msg = score===6 ? '🎉 ممتاز! أنت خبير في هذا الموضوع!' :
              score>=4 ? '👏 أداء رائع! استمر في التعلم!' :
              score>=2 ? '📚 جيد! راجع الموضوع في Learning Hub' :
              '💪 لا تستسلم! حاول مرة أخرى';
  scores[g.id] = {score, date: Date.now()};
  localStorage.setItem('physicsScores', JSON.stringify(scores));

  document.getElementById('modalBody').innerHTML = `
    <div class="results">
      <div class="score-circle" style="--pct:${pct}">
        <div class="score-inner">
          <span class="score-number">${score}</span>
          <span class="score-total">من 6</span>
        </div>
      </div>
      <h3>${g.title}</h3>
      <p class="results-msg">${msg}</p>
      ${hasBadge ? `<div class="earned-badge">🏆 حصلت على شارة "${getBadge(score)}"!</div><br>` : ''}
      <div class="results-btns">
        <button class="btn-retry" onclick="openGame('${g.id}')">🔄 حاول مجدداً</button>
        <button class="btn-done" onclick="closeModal()">✅ إنهاء</button>
      </div>
    </div>
  `;
}

// ===================== CHART =====================
let chart = null;
function renderChart(){
  const labels = GAMES.map(g=>g.icon+' '+g.title.substring(0,12)+'...');
  const data = GAMES.map(g=> scores[g.id] ? scores[g.id].score : 0);
  const colors = GAMES.map(g=>g.glow.replace('0.2','0.7'));

  if(chart) chart.destroy();
  const ctx = document.getElementById('resultsChart').getContext('2d');
  chart = new Chart(ctx, {
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'درجتك (من 6)',
        data,
        backgroundColor: colors,
        borderColor: colors.map(c=>c.replace('0.7','1')),
        borderWidth:2,
        borderRadius:8,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#E8F1F8',font:{family:'Tajawal',size:13}}},
        tooltip:{callbacks:{
          label:ctx=>`النتيجة: ${ctx.raw}/6 (${Math.round(ctx.raw/6*100)}%)`
        }}
      },
      scales:{
        y:{min:0,max:6,ticks:{stepSize:1,color:'#8faec7'},grid:{color:'rgba(255,255,255,0.05)'}},
        x:{ticks:{color:'#8faec7',font:{family:'Tajawal'}},grid:{display:false}}
      }
    }
  });
}

function toggleNav(){document.getElementById('navLinks').classList.toggle('open');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target.id==='modalOverlay')closeModal();});

renderCards();
renderChart();
</script>
